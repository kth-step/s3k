caps:
  - name: Memory
    fields:
      - begin 32
      - end 32
      - rwx 3
      - free 32
      - pmp 1
    asserts:
      - 'begin == free'
      - 'begin < end'
      - 'pmp == 0'
      - 'rwx == 0x4 || rwx == 0x5 || rwx == 0x6 || rwx == 0x7'
  - name: Pmp
    fields:
      - addr 32
      - rwx 3
    asserts:
      - 'rwx == 0x4 || rwx == 0x5 || rwx == 0x6 || rwx == 0x7'
  - name: Time
    fields:
      - hartid 8
      - begin 16
      - end 16
      - free 16
    asserts:
      - 'MIN_HARTID <= hartid'
      - 'hartid <= MAX_HARTID' 
      - 'begin == free'
      - 'begin < end'
      - 'end <= N_QUANTUM'
  - name: Channels
    fields:
      - begin 16
      - end 16
      - free 16
    asserts:
      - 'begin == free'
      - 'begin < end'
      - 'end <= N_CHANNELS'
  - name: Receiver
    fields:
      - channel 16
      - grant 1
    asserts:
      - 'channel < N_CHANNELS'
  - name: Sender
    fields:
      - channel 16
      - grant 1
    asserts:
      - 'channel < N_CHANNELS'
  - name: Server
    fields:
      - channel 16
      - grant 1
    asserts:
      - 'channel < N_CHANNELS'
  - name: Client
    fields:
      - channel 16
      - grant 1
    asserts:
      - 'channel < N_CHANNELS'
  - name: Supervisor
    fields:
      - begin 8
      - end 8
      - free 8
    asserts:
      - 'begin == free'
      - 'begin < end'
      - 'end <= N_PROC'

predicates:
  - name: is_child
    cases:
      - parent: memory
        child: memory
        conditions:
        - 'p:begin <= c:begin'
        - 'c:end <= p:free'
        - '(c:rwx & p:rwx) == c:rwx'
      - parent: memory
        child: pmp
        conditions:
          - 'p:free <= pmp_napot_begin(c:addr)'
          - 'pmp_napot_end(c:addr) <= p:end'
          - 'p:pmp == 1'
          - '(c:rwx & p:rwx) == c:rwx'
      - parent: time
        child: time
        conditions:
          - 'p:begin <= c:begin'
          - 'c:end <= p:free'
          - 'p:hartid == c:hartid'
      - parent: channels
        child: channels
        conditions:
          - 'p:begin <= c:begin'
          - 'c:end <= p:free'
      - parent: channels
        child: receiver
        conditions:
          - 'p:begin <= c:channel'
          - 'c:channel < p:free'
      - parent: channels
        child: sender
        conditions:
          - 'p:begin <= c:channel'
          - 'c:channel < p:free'
      - parent: channels
        child: server
        conditions:
          - 'p:begin <= c:channel'
          - 'c:channel < p:free'
      - parent: channels
        child: client
        conditions:
          - 'p:begin <= c:channel'
          - 'c:channel < p:free'
      - parent: receiver
        child: sender
        conditions:
          - 'p:channel == c:channel'
      - parent: server
        child: client 
        conditions:
          - 'p:channel == c:channel'
      - parent: supervisor
        child: supervisor
        conditions:
          - 'p:begin <= c:begin'
          - 'c:end <= p:free'
  - name: can_derive
    cases:
      - parent: memory
        child: memory
        conditions:
          - 'p:pmp == 0'
          - 'c:pmp == 0'
          - 'p:free == c:begin'
          - 'c:end <= p:end'
          - '(c:rwx & p:rwx) == c:rwx'
          - 'c:free == c:begin'
          - 'c:begin < c:end'
      - parent: memory
        child: pmp
        conditions:
          - 'p:free <= pmp_napot_begin(c:addr)'
          - 'pmp_napot_end(c:addr) <= p:end'
          - '(c:rwx & p:rwx) == c:rwx'
      - parent: time
        child: time
        conditions:
          - 'p:hartid == c:hartid'
          - 'p:free == c:begin'
          - 'c:end <= p:end'
          - 'c:free == c:begin'
          - 'c:begin < c:end'
      - parent: channels
        child: channels
        conditions:
          - 'p:free == c:begin'
          - 'c:end <= p:end'
          - 'c:free == c:begin'
          - 'c:begin < c:end'
      - parent: channels
        child: receiver
        conditions:
          - 'p:free == c:channel'
          - 'c:channel < p:end'
          - 'c:grant == 0 || c:grant == 1'
      - parent: receiver
        child: sender
        conditions:
          - 'p:channel == c:channel'
          - 'p:grant == c:grant'
      - parent: channels
        child: server
        conditions:
          - 'p:free == c:channel'
          - 'c:channel < p:end'
          - 'c:grant == 0 || c:grant == 1'
      - parent: server 
        child: client
        conditions:
          - 'p:channel == c:channel'
          - 'p:grant == c:grant'
      - parent: supervisor
        child: supervisor
        conditions:
          - 'p:free <= c:begin'
          - 'c:end <= p:end'
          - 'c:free == c:begin'
          - 'c:begin < c:end'
